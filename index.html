<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nula's Reminder</title>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body class="light-mode">
    <div id="app">
        <aside id="side-panel">
            <div class="brand">
                <img src="/resources/images/icon.png" alt="Icon" class="nav-icon">
                <span>Nula's Reminder</span>
            </div>
            <nav>
                <button id="nav-tasks" class="nav-btn active">Tasks</button>
                <button id="nav-settings" class="nav-btn">Settings</button>
            </nav>
        </aside>

        <main id="main-content">
            <!-- Tasks View -->
            <section id="tasks-view">
                <header>
                    <h1>Tasks</h1>
                    <div class="sort-container">
                        <span>Sort by:</span>
                        <button id="sort-trigger-btn">[+]</button>
                        <div id="sort-popup" class="popup">
                            <div class="sort-row">
                                <span>Order</span>
                                <button class="sort-opt" data-type="order" data-val="asc">Ascending</button>
                                <button class="sort-opt" data-type="order" data-val="desc">Descending</button>
                            </div>
                            <div class="sort-row">
                                <span>Date</span>
                                <button class="sort-opt" data-type="date" data-val="added">Added</button>
                                <button class="sort-opt" data-type="date" data-val="modified">Modified</button>
                            </div>
                            <div class="sort-row">
                                <span>Tags</span>
                                <button class="filter-opt active" data-tag="Highlight">Highlight</button>
                                <button class="filter-opt active" data-tag="Pending">Pending</button>
                                <button class="filter-opt active" data-tag="On hold">On hold</button>
                                <button class="filter-opt active" data-tag="Finished">Finished</button>
                            </div>
                        </div>
                    </div>
                </header>

                <div id="task-groups">
                    <div class="task-group" id="group-Highlight">
                        <div class="group-header" data-tag="Highlight">
                            <h2>Highlight</h2>
                        </div>
                        <div class="group-content"></div>
                    </div>
                    <div class="task-group" id="group-Pending">
                        <div class="group-header" data-tag="Pending">
                            <h2>Pending</h2>
                        </div>
                        <div class="group-content"></div>
                    </div>
                    <div class="task-group" id="group-On hold">
                        <div class="group-header" data-tag="On hold">
                            <h2>On hold</h2>
                        </div>
                        <div class="group-content"></div>
                    </div>
                    <div class="task-group" id="group-Finished">
                        <div class="group-header" data-tag="Finished">
                            <h2>Finished</h2>
                        </div>
                        <div class="group-content"></div>
                    </div>
                </div>

                <button id="fab-add-task">
                    <img src="/resources/images/light_mode/add_light.png" id="add-icon">
                </button>
            </section>

            <!-- Settings View -->
            <section id="settings-view" style="display: none;">
                <h1>Settings</h1>
                <div class="setting-item">
                    <span>Darkmode</span>
                    <label class="switch">
                        <input type="checkbox" id="dark-mode-toggle">
                        <span class="slider"></span>
                    </label>
                </div>
            </section>
        </main>

        <!-- Task Add Modal -->
        <div id="task-add-modal" class="modal">
            <div class="modal-content task-add-content">
                <h2>New task</h2>
                <div class="form-row">
                    <label>Name: </label><input type="text" id="task-name">
                </div>
                <div class="form-row">
                    <label>Description: </label><textarea id="task-desc"></textarea>
                </div>
                <div class="form-row">
                    <label>Deadline: </label><input type="date" id="task-deadline">
                </div>
                <div class="form-row tags-row">
                    <label>Tags: </label>
                    <div class="tag-selector">
                        <button class="tag-opt" data-tag="Highlight">Highlight</button>
                        <button class="tag-opt" data-tag="Pending">Pending</button>
                        <button class="tag-opt" data-tag="On hold">On hold</button>
                        <button class="tag-opt" data-tag="Finished">Finished</button>
                    </div>
                </div>
                <div class="subtask-section">
                    <h3>Sub-task</h3>
                    <div id="subtask-form-add-modal" class="subtask-add-form">
                        <input type="text" id="subtask-name-add-modal" placeholder="Sub-task name">
                        <input type="text" id="subtask-desc-add-modal" placeholder="Description" class="flex-grow">
                        <button id="confirm-subtask-btn-add-modal">Add</button>
                    </div>
                    <table class="subtask-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Desc</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="subtask-list-add-modal">
                            <!-- Temporary subtasks will be rendered here -->
                        </tbody>
                    </table>
                </div>
                <div class="modal-actions right">
                    <button id="save-task-btn">Save</button>
                    <button id="cancel-task-btn">Cancel</button>
                </div>
            </div>
        </div>

        <!-- Task Detail Modal -->
        <div id="task-detail-modal" class="modal">
            <div class="modal-content task-detail-content">
                <div class="detail-header">
                    <h2 id="detail-name"></h2>
                    <span id="detail-tag" class="tag-label"></span>
                </div>
                <div class="detail-meta">
                    <div>Date added: <span id="detail-added"></span></div>
                    <div>Deadline: <span id="detail-deadline"></span></div>
                </div>
                <div class="subtask-section">
                    <h3>Sub-task</h3>
                    <div class="subtask-add-form">
                        <input type="text" id="subtask-name" placeholder="Sub-task name">
                        <input type="text" id="subtask-desc" placeholder="Description">
                        <button id="add-subtask-btn">Add</button>
                    </div>
                    <table class="subtask-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Desc</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="subtask-list">
                            <!-- Subtasks will be rendered here -->
                        </tbody>
                    </table>
                </div>
                <div class="modal-actions">
                    <button id="close-detail-btn">Close</button>
                    <button id="delete-task-btn">Delete</button>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
</body>
</html>
